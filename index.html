<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>MSDS 모바일 뷰어</title>
  <script>
    window.__CONFIG__ = {
      repoOwner: "kih4602",
      repoName:  "MSDS",
      branch:    "main",
      dataPath:  "",
      logoUrl:   "https://raw.githubusercontent.com/kih4602/picture/main/%EC%97%90%EB%84%88%EC%A7%80%ED%94%8C%EB%9F%AC%EC%8A%A4%EB%A1%9C%EA%B3%A0.png",
      // Google Docs Viewer를 기본으로 사용 (범용성 극대화)
      pdfViewerBase: "https://docs.google.com/viewer"
    };
  </script>
  <style>
    :root{
      --brand:#0A1E2E; --bg:#FFFFFF; --fg:#111315;
      --muted:#5b6b79; --radius:14px; --shadow:0 8px 24px rgba(10,30,46,.08);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font:16px/1.5 system-ui, -apple-system, sans-serif;
    }
    header{position:sticky; top:0; z-index:50; background:var(--bg); border-bottom:2px solid var(--brand); padding:10px;}
    .topbar{display:flex; align-items:center; gap:10px; max-width:800px; margin:0 auto;}
    .logo{height:34px; width:auto;}
    
    .search-wrap{
      display:flex; align-items:center; gap:8px; flex:1;
      border:2px solid var(--brand); border-radius:999px; padding:6px 12px;
    }
    .search-wrap input{border:0; outline:none; width:100%; font-size:16px;}

    main{padding:12px; max-width:800px; margin:0 auto;}
    .grid{display:grid; gap:12px; grid-template-columns:1fr;}
    
    .card{
      border:2px solid var(--brand); border-radius:var(--radius);
      padding:16px; background:#fff; box-shadow:var(--shadow);
      cursor:pointer; font-weight:bold; font-size:17px;
    }

    /* 뷰어 영역 */
    .viewer-container { display: flex; flex-direction: column; height: calc(100vh - 80px); gap: 10px; }
    .viewer-toolbar { display: flex; justify-content: space-between; align-items: center; }
    .viewer-frame-wrap { 
      flex: 1; border: 2px solid var(--brand); border-radius: var(--radius); 
      overflow: hidden; background: #eee; position: relative;
    }
    iframe { width: 100%; height: 100%; border: 0; }
    
    .btn {
      appearance:none; border:2px solid var(--brand); background:#fff; 
      color:var(--brand); border-radius:10px; padding:10px 16px; 
      font-weight:bold; cursor:pointer; font-size:14px;
    }
    .btn-primary { background: var(--brand); color: #fff; }

    .loading-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; color: var(--muted); pointer-events: none;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <img id="logo" class="logo" alt="Logo" />
    <div id="searchBox" class="search-wrap">
      <input id="searchInput" type="search" placeholder="MSDS 검색..." autocomplete="off" />
    </div>
    <button id="btnHome" class="btn hidden">홈</button>
  </div>
</header>

<main id="content">
  <div id="status" class="card">목록을 불러오는 중...</div>
  
  <!-- 리스트 섹션 -->
  <section id="listSection" class="grid hidden"></section>

  <!-- 뷰어 섹션 -->
  <section id="viewerSection" class="viewer-container hidden">
    <div class="viewer-toolbar">
      <div id="currentTitle" style="font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:50vw;"></div>
      <div style="display:flex; gap:6px;">
        <a id="directDownload" class="btn" target="_blank">원본보기</a>
        <button id="closeViewer" class="btn btn-primary">닫기</button>
      </div>
    </div>
    <div class="viewer-frame-wrap">
      <div id="iframeLoading" class="loading-overlay">문서를 여는 중...<br>(시간이 걸릴 수 있습니다)</div>
      <iframe id="pdfFrame" src="about:blank"></iframe>
    </div>
  </section>
</main>

<script>
(function(){
  const cfg = window.__CONFIG__;
  const state = { items: [], current: null };

  const $status = document.getElementById('status');
  const $listSection = document.getElementById('listSection');
  const $viewerSection = document.getElementById('viewerSection');
  const $pdfFrame = document.getElementById('pdfFrame');
  const $searchInput = document.getElementById('searchInput');
  const $searchBox = document.getElementById('searchBox');
  const $btnHome = document.getElementById('btnHome');
  const $directDownload = document.getElementById('directDownload');

  // 로고 설정
  document.getElementById('logo').src = cfg.logoUrl;

  function getDisplayName(filename) {
    return filename.replace(/\.[^/.]+$/, "").replace(/^\d+[_]/, "").replace(/_MSDS/i, "");
  }

  async function fetchFiles(path = "") {
    const url = `https://api.github.com/repos/${cfg.repoOwner}/${cfg.repoName}/contents/${path}`;
    const res = await fetch(url);
    const data = await res.json();
    let files = [];
    for (let item of data) {
      if (item.type === "file" && item.name.toLowerCase().endsWith(".pdf")) {
        files.push(item);
      } else if (item.type === "dir") {
        const sub = await fetchFiles(item.path);
        files = files.concat(sub);
      }
    }
    return files;
  }

  function renderList(list) {
    $listSection.innerHTML = '';
    list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'card';
      div.textContent = getDisplayName(item.name);
      div.onclick = () => openViewer(item);
      $listSection.appendChild(div);
    });
    $listSection.classList.remove('hidden');
    $status.classList.add('hidden');
  }

  function openViewer(item) {
    state.current = item;
    const displayName = getDisplayName(item.name);
    document.getElementById('currentTitle').textContent = displayName;
    
    // Google Docs Viewer URL 생성
    const viewerUrl = `${cfg.pdfViewerBase}?url=${encodeURIComponent(item.download_url)}&embedded=true`;
    
    $pdfFrame.src = viewerUrl;
    $directDownload.href = item.download_url; // 뷰어 안뜰 때를 대비한 원본 링크
    
    $listSection.classList.add('hidden');
    $searchBox.classList.add('hidden');
    $viewerSection.classList.remove('hidden');
    $btnHome.classList.remove('hidden');

    document.getElementById('iframeLoading').classList.remove('hidden');
    $pdfFrame.onload = () => {
      document.getElementById('iframeLoading').classList.add('hidden');
    };
  }

  function closeViewer() {
    $pdfFrame.src = "about:blank";
    $viewerSection.classList.add('hidden');
    $btnHome.classList.add('hidden');
    $searchBox.classList.remove('hidden');
    $listSection.classList.remove('hidden');
  }

  // 검색 필터
  $searchInput.oninput = () => {
    const q = $searchInput.value.toLowerCase();
    const filtered = state.items.filter(i => i.name.toLowerCase().includes(q));
    renderList(filtered);
  };

  $btnHome.onclick = closeViewer;
  document.getElementById('closeViewer').onclick = closeViewer;

  // 초기화
  async function init() {
    try {
      state.items = await fetchFiles(cfg.dataPath);
      state.items.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
      
      const params = new URLSearchParams(location.search);
      const query = params.get('q');

      if (query) {
        const match = state.items.find(i => i.name.toLowerCase().includes(query.toLowerCase()));
        if (match) {
          openViewer(match);
        } else {
          renderList(state.items);
        }
      } else {
        renderList(state.items);
      }
    } catch (e) {
      $status.textContent = "오류가 발생했습니다. 페이지를 새로고침 해주세요.";
    }
  }

  init();
})();
</script>
</body>
</html>
